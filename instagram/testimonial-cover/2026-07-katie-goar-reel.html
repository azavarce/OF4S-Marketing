<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OF4S — Testimonial Reel Cover: Katie Goar (draft)</title>
<link rel="stylesheet" href="../../design-system/tokens.css" />
<style>
  body {
    margin: 0;
    background: var(--of4s-paper-200);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 24px;
  }

  /* ── Reusable testimonial reel-cover component ─────────────────────
     Canvas is the full Reel cover, 1080x1920 (9:16).
     The profile GRID only shows the center 1080x1350 (4:5) crop —
     285px is cropped off the top and 285px off the bottom.
     Keep the face and the text panel inside that center band, or
     they won't show up when someone is scrolling the grid. ─────────── */
  .cover {
    position: relative;
    width: 1080px;
    max-width: 100%;
    aspect-ratio: 1080 / 1920;
    border-radius: 12px;
    overflow: hidden;
    font-family: var(--of4s-font-sans);
    box-shadow: var(--of4s-shadow-lg);
  }

  /* Grid-safe guide — 4:5 center crop. Visible only with .show-guide on <body>, never in exports. */
  .cover .safe-guide {
    position: absolute;
    left: 0; right: 0;
    top: 14.844%;    /* 285 / 1920 */
    bottom: 14.844%; /* 285 / 1920 */
    border-top: 2px dashed rgba(201,164,116,0.85);
    border-bottom: 2px dashed rgba(201,164,116,0.85);
    z-index: 5;
    display: none;
  }
  body.show-guide .safe-guide { display: block; }

  /* Photo slot — swap background-image per post. Cover, anchored so the
     face sits well inside the 4:5 safe zone (roughly upper-middle third). */
  .cover .photo {
    position: absolute;
    inset: 0;
    background: var(--of4s-stone-500) url('katie-goar.png') center 22% / cover no-repeat;
  }
  .cover .photo-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--of4s-font-mono);
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(250,248,244,0.55);
    text-align: center;
    padding: 0 60px;
  }

  /* Light lift so the panel doesn't sit on a hard photo edge */
  .cover .scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(10,22,40,0.35) 0%,
      rgba(10,22,40,0) 32%
    );
  }

  /* Bottom-anchored group: the tag sits on the photo, directly above the
     navy box, and the box follows right under it — stacked, not nested.
     Floated up off the true bottom edge (bottom offset = 285px crop +
     40px buffer = 325px) so the whole group stays inside the 1080x1350
     grid-safe zone. Do not set bottom:0 on this variant. */
  .cover .foot {
    position: absolute;
    left: 0; right: 0;
    bottom: 325px;
    z-index: 2;
  }

  /* "Client Testimonial" tag — outside the navy box, on the photo. Its
     own small gradient keeps it legible without needing a pill/badge
     shape. Sized well above body-text scale so it reads first, even
     shrunk to a grid thumbnail. */
  .cover .tag {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 32px 56px 22px;
    background: linear-gradient(to top, rgba(10,22,40,0.6) 0%, rgba(10,22,40,0) 100%);
  }
  .cover .tag .mark {
    font-family: var(--of4s-font-display);
    font-weight: 300;
    font-size: 72px;
    line-height: 0.4;
    color: var(--of4s-navy-300);
    transform: scaleX(-1);
  }
  .cover .tag .label {
    font-family: var(--of4s-font-mono);
    font-weight: 800;
    font-size: 36px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--of4s-paper-50);
    text-shadow: 0 2px 14px rgba(10,22,40,0.85);
  }

  /* Text panel — solid navy card, not a fade. This is the "shape" that defines the copy area. */
  .cover .content {
    background: rgba(10,22,40,0.94);
    border-top: 1px solid rgba(143,169,199,0.35);
    border-radius: 0 0 var(--of4s-radius-lg) var(--of4s-radius-lg);
    padding: 40px 56px 48px;
  }

  .cover .name {
    font-family: var(--of4s-font-display);
    font-weight: 500;
    font-size: 66px;
    line-height: 1.04;
    letter-spacing: -0.02em;
    color: var(--of4s-paper-50);
    margin: 0 0 16px;
  }
  .cover .role {
    font-family: var(--of4s-font-mono);
    font-weight: 500;
    font-size: 24px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--of4s-paper-200);
    line-height: 1.4;
  }
  .cover .role .company {
    color: var(--of4s-navy-300);
  }

  .stage-label {
    text-align: center;
    font-family: var(--of4s-font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--of4s-stone-600);
    margin-top: 18px;
  }
</style>
</head>
<body>
  <div>
    <div class="cover">
      <div class="photo"></div>
      <div class="scrim"></div>
      <div class="foot">
        <div class="tag">
          <span class="mark">&ldquo;</span>
          <span class="label">Client Testimonial</span>
        </div>
        <div class="content">
          <p class="name">Katie Goar</p>
          <div class="role">President <span class="company">&middot; Quadel Consulting &amp; Training</span></div>
        </div>
      </div>
      <div class="safe-guide"></div>
    </div>
    <div class="stage-label">1080 &times; 1920 reel cover &middot; grid shows center 1080 &times; 1350 &middot; instagram/testimonial-cover/2026-07-katie-goar-reel.html</div>
  </div>
</body>
</html>
